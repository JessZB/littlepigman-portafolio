<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Pixel Artist - Transer OS Portfolio</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fuente Pixelada -->
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&display=swap"
      rel="stylesheet"
    />
    <!-- Three.js para el visor 3D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
      :root {
        /* Paleta del Artista (Purple Theme) */
        --color-bg-deep: #09000c;
        --color-dark-purple: #1c0217;
        --color-panel-bg: #311c48;

        --color-highlight: #4c3f91;
        --color-panel-border-glow: #9145b6;
        --color-panel-border: #b958a5;

        --color-danger: #ff5677;
        --color-accent: rgb(255, 234, 0);

        --color-text-main: #ffffff;
        --color-text-muted: #e0b0d5;
      }

      /* Estilos Globales y Reset Pixel Art */
      body {
        margin: 0;
        background-color: var(--color-bg-deep);
        background-image:
          radial-gradient(
            circle at 50% 50%,
            var(--color-dark-purple) 0%,
            var(--color-bg-deep) 100%
          ),
          linear-gradient(rgba(185, 88, 165, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(185, 88, 165, 0.05) 1px, transparent 1px);
        background-size:
          100% 100%,
          32px 32px,
          32px 32px;
        font-family: 'VT323', monospace;
        color: var(--color-text-main);
        overflow: hidden;
        image-rendering: pixelated;
        font-smooth: never;
        -webkit-font-smoothing: none;
      }

      .scanlines {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0),
          rgba(255, 255, 255, 0) 50%,
          rgba(0, 0, 0, 0.2) 50%,
          rgba(0, 0, 0, 0.2)
        );
        background-size: 100% 4px;
        pointer-events: none;
        z-index: 9999;
      }

      .cyber-panel {
        background-color: var(--color-panel-bg);
        border: 2px solid var(--color-panel-border);
        box-shadow:
          inset 2px 2px 0px rgba(255, 255, 255, 0.2),
          inset -2px -2px 0px rgba(0, 0, 0, 0.6),
          0 4px 10px rgba(0, 0, 0, 0.5);
        position: relative;
      }

      .cyber-panel::before {
        content: '';
        position: absolute;
        top: -2px;
        left: -2px;
        width: 8px;
        height: 8px;
        background-color: var(--color-accent);
      }

      .nav-btn {
        background-color: var(--color-dark-purple);
        border: 2px solid var(--color-highlight);
        color: var(--color-text-muted);
        transition: all 0.1s steps(2);
        box-shadow: inset -2px -2px 0px rgba(0, 0, 0, 0.5);
        cursor: pointer;
        text-transform: uppercase;
      }

      .nav-btn:hover {
        background-color: var(--color-panel-border-glow);
        color: #fff;
      }

      .nav-btn.active {
        background-color: var(--color-panel-bg);
        border-color: var(--color-panel-border);
        color: #fff;
        box-shadow: inset 2px 2px 0px rgba(255, 255, 255, 0.3);
        transform: translateX(0px); /* Ajustado para movil */
      }
      @media (min-width: 768px) {
        .nav-btn.active {
          transform: translateX(5px);
        }
      }

      /* Barras de estadísticas */
      .stat-bar-container {
        background-color: #000;
        border: 2px solid #333;
        height: 16px;
        width: 100%;
        position: relative;
      }
      .stat-bar-fill {
        height: 100%;
        background: linear-gradient(
          to bottom,
          #d279c1 0%,
          var(--color-panel-border) 50%,
          #7a2b69 100%
        );
        box-shadow: inset -2px 0px 0px rgba(0, 0, 0, 0.3);
        transition: width 0.5s ease-out;
      }
      .stat-bar-fill.exp {
        background: linear-gradient(
          to bottom,
          #ffffaa 0%,
          var(--color-accent) 50%,
          #aa8800 100%
        );
      }
      .stat-bar-fill.ui {
        background: linear-gradient(
          to bottom,
          #d699ef 0%,
          var(--color-panel-border-glow) 50%,
          #5d207a 100%
        );
      }

      /* Elementos de Galería y Proyectos */
      .gallery-item,
      .project-card {
        background-color: #000;
        border: 2px solid var(--color-text-muted);
        cursor: pointer;
        transition: all 0.1s steps(2);
        position: relative;
        overflow: hidden;
      }
      .gallery-item {
        aspect-ratio: 1;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .project-card {
        aspect-ratio: 16/9;
        display: flex;
        flex-direction: column;
      }

      .gallery-item:hover,
      .project-card:hover {
        border-color: var(--color-panel-border);
        transform: scale(1.02);
        z-index: 10;
        box-shadow: 0 0 15px rgba(185, 88, 165, 0.5);
      }

      .gallery-item img,
      .project-card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        image-rendering: pixelated;
      }
      .project-card img {
        flex: 1;
        min-height: 0;
      }

      .gallery-badge {
        position: absolute;
        bottom: 0;
        right: 0;
        background: rgba(0, 0, 0, 0.8);
        color: var(--color-panel-border);
        font-size: 0.8rem;
        padding: 2px 4px;
        border-top: 1px solid var(--color-panel-border);
        border-left: 1px solid var(--color-panel-border);
      }

      .project-title-bar {
        background: var(--color-dark-purple);
        border-top: 2px solid var(--color-panel-border);
        padding: 4px 8px;
        font-size: 1rem;
        color: #fff;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      @media (min-width: 640px) {
        .project-title-bar {
          font-size: 1.2rem;
        }
      }

      /* Utilidades */
      .view-hidden {
        display: none !important;
      }
      #lightbox {
        backdrop-filter: blur(4px);
      }
      .pixelated {
        image-rendering: pixelated;
      }

      /* Ocultar barra de scroll en navegación horizontal móvil */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Visor 3D y Assets */
      .holo-viewer {
        width: 100%;
        min-height: 200px;
        background: radial-gradient(circle at 50% 50%, #1c0217 0%, #000 100%);
        border: 2px solid var(--color-highlight);
        position: relative;
        cursor: grab;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      @media (min-width: 768px) {
        .holo-viewer {
          min-height: 250px;
        }
      }

      .holo-viewer:active {
        cursor: grabbing;
      }
      .holo-viewer::after {
        content: 'SIMULACIÓN_3D_ACTIVA';
        position: absolute;
        top: 4px;
        left: 4px;
        color: var(--color-highlight);
        font-size: 0.8rem;
        pointer-events: none;
      }

      /* Scrollbar general */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      @media (min-width: 768px) {
        ::-webkit-scrollbar {
          width: 12px;
          height: 12px;
        }
      }
      ::-webkit-scrollbar-track {
        background: #000;
        border-left: 1px solid var(--color-panel-border);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--color-panel-bg);
        border: 1px solid var(--color-panel-border);
      }
    </style>
  </head>
  <!-- h-[100dvh] previene problemas en navegadores moviles con la barra de direcciones -->
  <body
    class="h-[100dvh] w-screen flex items-center justify-center text-lg sm:text-xl lg:text-2xl overflow-hidden"
  >
    <div class="scanlines"></div>

    <!-- Contenedor ajustado para no tener paddings externos fijos en movil, actuando como fullscreen app -->
    <div
      class="w-full h-full sm:max-w-6xl sm:max-h-[900px] flex flex-col md:flex-row sm:p-4 gap-2 sm:gap-4 relative"
    >
      <!-- Header Móvil -->
      <header
        class="md:hidden flex justify-between items-center cyber-panel p-2 z-10 mx-2 mt-2 sm:mx-0 sm:mt-0 shrink-0"
      >
        <div class="text-white font-bold tracking-widest">TRANSER_OS</div>
        <div class="text-[var(--color-panel-border)] text-sm clock-display">
          12:00:00
        </div>
      </header>

      <!-- Navegación -->
      <nav
        class="md:w-64 flex md:flex-col gap-2 z-10 overflow-x-auto no-scrollbar md:overflow-visible pb-2 md:pb-0 px-2 sm:px-0 shrink-0"
      >
        <div class="hidden md:block cyber-panel p-4 mb-4 text-center">
          <div
            class="text-sm text-[var(--color-text-muted)] tracking-widest border-b border-[var(--color-panel-border)] pb-1 mb-2"
          >
            SISTEMA
          </div>
          <div class="text-3xl text-white font-bold">NEXUS</div>
          <div class="text-[var(--color-panel-border)] mt-1 clock-display">
            12:00:00
          </div>
        </div>

        <!-- Botones con flex-none en movil para que no se aplasten -->
        <button
          class="nav-btn active flex-none md:flex-1 p-2 sm:p-3 text-center md:text-left md:pl-4 whitespace-nowrap min-w-[120px] md:min-w-0"
          onclick="switchView('view-profile', this)"
        >
          [01] PERFIL
        </button>
        <button
          class="nav-btn flex-none md:flex-1 p-2 sm:p-3 text-center md:text-left md:pl-4 whitespace-nowrap min-w-[120px] md:min-w-0"
          onclick="switchView('view-database', this)"
        >
          [02] PROYECTOS
        </button>
        <button
          class="nav-btn flex-none md:flex-1 p-2 sm:p-3 text-center md:text-left md:pl-4 whitespace-nowrap min-w-[120px] md:min-w-0"
          onclick="switchView('view-comms', this)"
        >
          [03] COMMS
        </button>
      </nav>

      <!-- Contenido Principal -->
      <main
        class="flex-1 flex flex-col min-h-0 relative z-10 gap-2 sm:gap-4 px-2 pb-2 sm:px-0 sm:pb-0"
      >
        <!-- VISTA 1: PERFIL (Renderizado vía JSON) -->
        <section
          id="view-profile"
          class="flex-1 flex flex-col gap-2 sm:gap-4 h-full overflow-y-auto pr-1 sm:pr-2"
        >
          <!-- Se inyecta con JS -->
        </section>

        <!-- VISTA 2: BASE DE DATOS (Proyectos) -->
        <section
          id="view-database"
          class="view-hidden flex-1 flex flex-col h-full cyber-panel p-3 sm:p-4 relative overflow-hidden"
        >
          <!-- ESTADO A: Lista de Proyectos -->
          <div id="project-list-view" class="flex flex-col h-full">
            <div
              class="flex justify-between items-center mb-3 sm:mb-4 border-b-2 border-[var(--color-panel-border)] pb-2 shrink-0"
            >
              <h2 class="text-2xl sm:text-3xl text-white uppercase">
                Directorio
              </h2>
              <div
                class="text-[var(--color-panel-border)] text-xs sm:text-sm animate-pulse hidden sm:block"
              >
                SISTEMA LISTO
              </div>
            </div>
            <div class="flex-1 overflow-y-auto pr-1 sm:pr-2">
              <div
                class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4"
                id="projects-grid"
              >
                <!-- Inyectado vía JS -->
              </div>
            </div>
          </div>

          <!-- ESTADO B: Detalle del Proyecto (Oculto por defecto) -->
          <div
            id="project-detail-view"
            class="view-hidden absolute inset-0 bg-[var(--color-panel-bg)] p-3 sm:p-4 flex flex-col h-full z-20 overflow-y-auto"
          >
            <!-- Cabecera del Detalle -->
            <div
              class="flex justify-between items-center mb-3 sm:mb-4 pb-2 border-b-2 border-[var(--color-panel-border)] shrink-0 sticky top-0 bg-[var(--color-panel-bg)] z-30"
            >
              <button
                onclick="closeProject()"
                class="bg-black border border-[var(--color-accent)] text-[var(--color-accent)] px-2 sm:px-3 py-1 hover:bg-[var(--color-accent)] hover:text-black transition-colors text-sm sm:text-base cursor-pointer truncate max-w-[70%]"
              >
                [< VOLVER ]
              </button>
              <div class="text-[var(--color-text-muted)] text-xs sm:text-sm">
                ACCEDIENDO...
              </div>
            </div>

            <!-- Contenido inyectado dinámicamente -->
            <div
              id="project-content-area"
              class="flex flex-col gap-4 sm:gap-6 pb-4"
            >
              <!-- Aquí va el título, descripción y los chunks de trabajo realizado -->
            </div>
          </div>
        </section>

        <!-- VISTA 3: COMMS -->
        <section
          id="view-comms"
          class="view-hidden flex-1 flex flex-col h-full overflow-y-auto pr-1 sm:pr-2"
        >
          <div
            class="cyber-panel p-3 sm:p-4 h-full flex flex-col relative min-h-[500px]"
          >
            <h2
              class="text-2xl sm:text-3xl text-white uppercase border-b-2 border-[var(--color-danger)] pb-2 mb-4 sm:mb-6 shrink-0"
            >
              Establecer Enlace
            </h2>
            <div class="flex flex-col lg:flex-row gap-6 sm:gap-8 flex-1">
              <div class="flex-1 flex flex-col gap-3 sm:gap-4">
                <p class="text-[var(--color-text-muted)] text-sm sm:text-base">
                  INGRESE DATOS DE TRANSMISIÓN:
                </p>
                <input
                  type="text"
                  placeholder="TU_NOMBRE..."
                  class="bg-black border-2 border-[var(--color-panel-border)] text-white p-2 focus:outline-none focus:border-[var(--color-accent)] font-['VT323'] text-lg sm:text-xl w-full"
                />
                <textarea
                  placeholder="MENSAJE..."
                  class="bg-black border-2 border-[var(--color-panel-border)] text-white p-2 flex-1 min-h-[120px] resize-none focus:outline-none focus:border-[var(--color-accent)] font-['VT323'] text-lg sm:text-xl w-full"
                ></textarea>
                <button
                  class="bg-[var(--color-panel-bg)] border-2 border-[var(--color-panel-border)] text-white p-2 sm:p-3 hover:bg-[var(--color-panel-border)] hover:text-black transition-colors font-bold uppercase cursor-pointer text-sm sm:text-base w-full"
                >
                  -> ENVIAR PAQUETE <-
                </button>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <!-- Modal Lightbox (Global) -->
    <div
      id="lightbox"
      class="fixed inset-0 bg-black/95 z-50 hidden flex-col items-center justify-center p-2 sm:p-4"
    >
      <div
        class="w-full max-w-4xl max-h-[90vh] cyber-panel p-2 flex flex-col relative"
      >
        <button
          onclick="closeLightbox()"
          class="absolute -top-3 -right-3 sm:-top-4 sm:-right-4 bg-[var(--color-danger)] border-2 border-white text-white w-8 h-8 sm:w-10 sm:h-10 flex items-center justify-center hover:scale-110 z-10 cursor-pointer text-lg"
        >
          X
        </button>
        <img
          id="lightbox-img"
          src=""
          alt="Arte"
          class="w-full h-[50vh] sm:h-[70vh] object-contain bg-black border-2 border-[var(--color-panel-border)] pixelated"
        />
        <div
          id="lightbox-title"
          class="text-center text-[var(--color-panel-border)] mt-2 text-xl sm:text-2xl uppercase truncate px-4"
        ></div>
      </div>
    </div>

    <script>
      // =========================================================================
      // 1. BASE DE DATOS JSON (El núcleo de toda la información)
      // =========================================================================
      const portfolioDB = {
        artist: {
          name: 'Alex Code',

          level: 99,
          bio: 'Especialista en arte digital retro, animación frame-by-frame y texturizado low-poly para videojuegos indie. Buscando nuevos retos en el ciberespacio.',
          stats: [
            { name: 'SPRITES (ANIM)', value: 80, class: '' },
            { name: '3D MODELING', value: 65, class: 'exp' },
            { name: 'UI / UX', value: 90, class: 'ui' },
          ],
          software: [
            { id: 'ASE', name: 'Aseprite', color: 'var(--color-panel-border)' },
            { id: 'BLND', name: 'Blender', color: 'var(--color-accent)' },
            {
              id: 'CSS',
              name: 'HTML/CSS',

            },
          ],
        },
        projects: [
          {
            id: 'prj_neon',
            title: 'Neon Syndicate',
            category: 'Comercial',
            thumbnail:
              'https://placehold.co/400x225/311c48/ffea00?text=NEON_SYNDICATE',
            role: 'Lead 3D & Pixel Artist',
            description:
              'RPG distópico donde fui responsable de la creación de vehículos en 3D low-poly y cientos de assets 2D para el inventario y UI.',
            workDone: [
              {
                type: '3d-model',
                title: 'Hoverbike Interceptor v2',
                description:
                  'Vehículo principal. Modelado en Blender (1200 tris). Texturas a mano en Aseprite para estética retro.',
                modelPlaceholderColor: 0xffea00,
                textures: [
                  {
                    name: 'Albedo Map',
                    img: 'https://placehold.co/128x128/1c0217/b958a5?text=ALBEDO',
                  },
                  {
                    name: 'Emission Map',
                    img: 'https://placehold.co/128x128/09000c/ff5677?text=GLOW',
                  },
                ],
              },
              {
                type: 'asset-group',
                groupTitle: 'Consumibles: Comida',
                description: 'Íconos de 32x32 para tiendas.',
                items: [
                  {
                    title: 'Ramen Neón',
                    img: 'https://placehold.co/128x128/311c48/ffea00?text=RAMEN',

                  },
                  {

          {

            category: 'Personal',
            thumbnail:

            role: 'Solo Dev / Artist',
            description:
              'Prototipo procedural. Enfoque exclusivo en Pixel Art tradicional.',
            workDone: [
              {
                type: 'asset-group',
                groupTitle: 'Enemigos',
                description: 'Animaciones idle y ataque.',
                items: [
                  {
                    title: 'Slime Tóxico',
                    img: 'https://placehold.co/128x128/003300/00ff00?text=SLIME',
                    desc: '4 frames',
                  },
                  {
                    title: 'Esqueleto',
                    img: 'https://placehold.co/128x128/333/fff?text=SKELETON',
                    desc: '6 frames',
                  },
                ],
              },
              {
                type: 'asset-group',
                groupTitle: 'Tileset',
                description: 'Reglas de 16x16 para autotiling.',
                items: [
                  {
                    title: 'Paredes y Suelo',

                    desc: 'RPG Maker',
                  },
                ],
              },
            ],
          },
        ],
      }

      // =========================================================================
      // 2. RENDERIZADO INICIAL
      // =========================================================================

      function updateClock() {
        const timeStr = new Date().toLocaleTimeString('es-ES', {
          hour12: false,
        })
        document
          .querySelectorAll('.clock-display')
          .forEach((el) => (el.textContent = timeStr))
      }
      setInterval(updateClock, 1000)
      updateClock()

      function initApp() {
        renderProfile()
        renderProjectList()
      }

      function switchView(viewId, btnElement) {
        document
          .querySelectorAll('main > section')
          .forEach((el) => el.classList.add('view-hidden'))
        document.getElementById(viewId).classList.remove('view-hidden')

        document
          .querySelectorAll('.nav-btn')
          .forEach((btn) => btn.classList.remove('active'))
        btnElement.classList.add('active')

        if (viewId === 'view-database') closeProject()

        // Si el elemento clickeado esta en una barra scrolleable movil, asegurar que sea visible
        if (window.innerWidth < 768) {
          btnElement.scrollIntoView({
            behavior: 'smooth',
            block: 'nearest',
            inline: 'center',
          })
        }
      }

      function renderProfile() {
        const profileHTML = `
                <div class="cyber-panel p-3 sm:p-4 flex flex-col sm:flex-row gap-4 sm:gap-6 items-center sm:items-start shrink-0 text-center sm:text-left">
                    <div class="w-24 h-24 sm:w-48 sm:h-48 border-4 border-[var(--color-panel-border)] bg-black relative shrink-0">
                        <img src="${portfolioDB.artist.avatar}" alt="Avatar" class="w-full h-full object-cover">
                        <div class="absolute bottom-0 w-full bg-[var(--color-panel-border)] text-black text-center font-bold text-xs sm:text-sm">Lv. ${portfolioDB.artist.level}</div>
                    </div>
                    <div class="flex-1 w-full">
                        <div class="flex flex-col sm:flex-row justify-between items-center sm:items-end border-b-2 border-gray-600 pb-2 mb-2 gap-2">
                            <div>
                                <div class="text-xs sm:text-sm text-[var(--color-panel-border)]">CLASE: ${portfolioDB.artist.role}</div>
                                <h1 class="text-3xl sm:text-5xl text-white uppercase leading-none mt-1 sm:mt-0">${portfolioDB.artist.name}</h1>
                            </div>
                            <div class="bg-black border border-[var(--color-accent)] text-[var(--color-accent)] px-2 py-1 text-xs sm:text-sm whitespace-nowrap">ESTADO: ${portfolioDB.artist.status}</div>
                        </div>
                        <p class="text-gray-300 text-base sm:text-lg leading-tight mt-2 sm:mt-4">${portfolioDB.artist.bio}</p>
                    </div>
                </div>

                <div class="flex flex-col md:flex-row gap-2 sm:gap-4 flex-1 min-h-0 pb-2 sm:pb-0">
                    <div class="cyber-panel p-3 sm:p-4 flex-1 flex flex-col">
                        <h2 class="text-xl sm:text-2xl text-white mb-3 sm:mb-4 border-l-4 border-[var(--color-panel-border)] pl-2">PARÁMETROS</h2>
                        <div class="flex flex-col gap-3 sm:gap-4">
                            ${portfolioDB.artist.stats
                              .map(
                                (stat) => `
                                <div>
                                    <div class="flex justify-between text-xs sm:text-sm mb-1">
                                        <span class="text-white">${stat.name}</span>
                                        <span class="text-[var(--color-panel-border)]">${stat.value}/100</span>
                                    </div>
                                    <div class="stat-bar-container"><div class="stat-bar-fill ${stat.class}" style="width: ${stat.value}%"></div></div>
                                </div>
                            `,
                              )
                              .join('')}
                        </div>
                    </div>
                    <div class="cyber-panel p-3 sm:p-4 flex-1 flex flex-col">
                        <h2 class="text-xl sm:text-2xl text-white mb-3 sm:mb-4 border-l-4 border-[var(--color-accent)] pl-2">SOFTWARE_EQUIPADO</h2>
                        <div class="grid grid-cols-3 gap-2 mt-auto sm:mt-2">
                            ${portfolioDB.artist.software
                              .map(
                                (sw) => `
                                <div class="aspect-square bg-black border border-gray-600 flex items-center justify-center hover:border-white transition-colors group cursor-help relative text-base sm:text-xl">
                                    <span style="color: ${sw.color}">${sw.id}</span>
                                    <div class="hidden group-hover:block absolute -top-8 bg-white text-black text-xs sm:text-sm px-2 z-10 whitespace-nowrap">${sw.name}</div>
                                </div>
                            `,
                              )
                              .join('')}
                            <div class="aspect-square bg-black border border-gray-600 flex items-center justify-center text-gray-500 text-xs sm:text-base">VACÍO</div>
                            <div class="aspect-square bg-black border border-gray-600 flex items-center justify-center text-gray-500 text-xs sm:text-base">VACÍO</div>
                            <div class="aspect-square bg-black border border-gray-600 flex items-center justify-center text-gray-500 text-xs sm:text-base">VACÍO</div>
                        </div>
                    </div>
                </div>
            `
        document.getElementById('view-profile').innerHTML = profileHTML
      }

      // =========================================================================
      // 3. LÓGICA DE PROYECTOS Y TRABAJO REALIZADO
      // =========================================================================
      let currentAnimationId = null

      function renderProjectList() {
        const grid = document.getElementById('projects-grid')
        grid.innerHTML = portfolioDB.projects
          .map(
            (p) => `
                <div class="project-card" onclick="openProject('${p.id}')">
                    <img src="${p.thumbnail}" alt="${p.title}">
                    <div class="project-title-bar">
                        <span class="truncate pr-2">${p.title}</span>
                        <span class="text-[var(--color-accent)] text-xs sm:text-sm border border-[var(--color-accent)] px-1 whitespace-nowrap hidden min-[350px]:block">${p.category}</span>
                    </div>
                </div>
            `,
          )
          .join('')
      }

      function openProject(projectId) {
        const project = portfolioDB.projects.find((p) => p.id === projectId)
        if (!project) return

        document
          .getElementById('project-list-view')
          .classList.add('view-hidden')
        const detailView = document.getElementById('project-detail-view')
        detailView.classList.remove('view-hidden')

        let contentHTML = `
                <div class="flex flex-col sm:flex-row gap-3 sm:gap-4 items-start border-b-2 border-gray-600 pb-3 sm:pb-4">
                    <img src="${project.thumbnail}" class="w-full sm:w-1/3 border-2 border-[var(--color-highlight)] pixelated" alt="Thumb">
                    <div class="w-full">
                        <h1 class="text-2xl sm:text-4xl text-white uppercase mb-1 sm:mb-2 text-shadow-glow">${project.title}</h1>
                        <div class="text-[var(--color-accent)] mb-2 sm:mb-4 text-sm sm:text-base">> ROL: ${project.role}</div>
                        <p class="text-gray-300 text-base sm:text-lg">${project.description}</p>
                    </div>
                </div>
                <h2 class="text-xl sm:text-2xl text-white border-l-4 border-[var(--color-danger)] pl-2 mt-2 sm:mt-4 uppercase">Registro de Trabajo Realizado</h2>
                <div class="flex flex-col gap-4 sm:gap-8">
            `

        project.workDone.forEach((work, index) => {
          if (work.type === '3d-model') {
            contentHTML += `
                        <div class="bg-black border border-[var(--color-panel-border)] p-3 sm:p-4 flex flex-col gap-3 sm:gap-4">
                            <div>
                                <h3 class="text-xl sm:text-2xl text-[var(--color-panel-border-glow)] leading-tight">${work.title}</h3>
                                <p class="text-gray-400 text-sm sm:text-base mt-1">${work.description}</p>
                            </div>
                            
                            <div class="flex flex-col lg:flex-row gap-3 sm:gap-4">
                                <div class="w-full lg:w-2/3 holo-viewer" id="canvas-container-${index}"></div>
                                
                                <div class="w-full lg:w-1/3 flex flex-col gap-2">
                                    <span class="text-[var(--color-accent)] text-xs sm:text-sm border-b border-gray-600 pb-1">ASSETS (TEXTURAS)</span>
                                    <div class="grid grid-cols-2 lg:grid-cols-1 xl:grid-cols-2 gap-2">
                                        ${work.textures
                                          .map(
                                            (tex) => `
                                            <div class="flex flex-col cursor-pointer hover:border-[var(--color-panel-border)] border border-transparent transition-all" onclick="openLightbox('${tex.img}', '${tex.name}')">
                                                <img src="${tex.img}" class="w-full aspect-square object-cover pixelated border border-gray-700" alt="${tex.name}">
                                                <span class="text-[10px] sm:text-xs text-center text-gray-400 mt-1 truncate px-1">${tex.name}</span>
                                            </div>
                                        `,
                                          )
                                          .join('')}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `
          } else if (work.type === 'asset-group') {
            contentHTML += `
                        <div class="bg-black border border-[var(--color-highlight)] p-3 sm:p-4">
                            <h3 class="text-xl sm:text-2xl text-[var(--color-text-muted)] mb-1 leading-tight">${work.groupTitle}</h3>
                            ${work.description ? `<p class="text-gray-400 text-sm sm:text-base mb-3 sm:mb-4">${work.description}</p>` : ''}
                            
                            <div class="grid grid-cols-2 min-[480px]:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-2 sm:gap-4">
                                ${work.items
                                  .map(
                                    (item) => `
                                    <div class="bg-[#111] border border-gray-700 p-2 cursor-pointer hover:border-[var(--color-accent)] transition-colors group flex flex-col" onclick="openLightbox('${item.img}', '${item.title}')">
                                        <div class="aspect-square bg-[#000] mb-2 flex items-center justify-center overflow-hidden">
                                            <img src="${item.img}" class="w-full h-full object-cover pixelated group-hover:scale-110 transition-transform" alt="${item.title}">
                                        </div>
                                        <div class="text-white text-sm sm:text-lg leading-tight truncate">${item.title}</div>
                                        ${item.desc ? `<div class="text-[var(--color-panel-border)] text-xs sm:text-sm truncate mt-auto">${item.desc}</div>` : ''}
                                    </div>
                                `,
                                  )
                                  .join('')}
                            </div>
                        </div>
                    `
          }
        })

        contentHTML += `</div>`
        document.getElementById('project-content-area').innerHTML = contentHTML

        // Iniciar simulaciones 3D e invocar un resize forzado para que en movil calcule bien el ancho
        setTimeout(() => {
          project.workDone.forEach((work, index) => {
            if (work.type === '3d-model') {
              initThreeJSHologram(
                `canvas-container-${index}`,
                work.modelPlaceholderColor,
              )
            }
          })
          window.dispatchEvent(new Event('resize'))
        }, 50)
      }

      function closeProject() {
        document
          .getElementById('project-detail-view')
          .classList.add('view-hidden')
        document
          .getElementById('project-list-view')
          .classList.remove('view-hidden')

        document.getElementById('project-content-area').innerHTML = ''
        if (currentAnimationId) {
          cancelAnimationFrame(currentAnimationId)
        }
      }

      // =========================================================================
      // 4. SIMULADOR DE VISOR 3D (Three.js)
      // =========================================================================
      function initThreeJSHologram(containerId, hexColor) {
        const container = document.getElementById(containerId)
        if (!container) return

        const scene = new THREE.Scene()
        const camera = new THREE.PerspectiveCamera(
          50,
          container.clientWidth / container.clientHeight,
          0.1,
          1000,
        )
        const renderer = new THREE.WebGLRenderer({
          alpha: true,
          antialias: false,
        })

        renderer.setSize(container.clientWidth, container.clientHeight)
        container.appendChild(renderer.domElement)

        const geometry = new THREE.IcosahedronGeometry(1.5, 0)
        const material = new THREE.MeshBasicMaterial({
          color: hexColor,
          wireframe: true,
          wireframeLinewidth: 2,
        })
        const mesh = new THREE.Mesh(geometry, material)
        scene.add(mesh)

        const coreMat = new THREE.MeshBasicMaterial({ color: 0x110011 })
        const core = new THREE.Mesh(
          new THREE.IcosahedronGeometry(1.4, 0),
          coreMat,
        )
        scene.add(core)

        camera.position.z = 5

        let isDragging = false
        let previousPosition = { x: 0, y: 0 }

        // Soporte Mouse
        container.addEventListener('mousedown', (e) => {
          isDragging = true
          previousPosition = { x: e.offsetX, y: e.offsetY }
        })
        window.addEventListener('mouseup', () => (isDragging = false))
        window.addEventListener('mousemove', (e) => {
          if (isDragging) {
            const deltaMove = {
              x: e.offsetX - previousPosition.x,
              y: e.offsetY - previousPosition.y,
            }
            mesh.rotation.y += deltaMove.x * 0.01
            mesh.rotation.x += deltaMove.y * 0.01
            core.rotation.y += deltaMove.x * 0.01
            core.rotation.x += deltaMove.y * 0.01
          }
          previousPosition = { x: e.offsetX, y: e.offsetY }
        })

        // Soporte Táctil (Mobile)
        container.addEventListener(
          'touchstart',
          (e) => {
            isDragging = true
            previousPosition = {
              x: e.touches[0].clientX,
              y: e.touches[0].clientY,
            }
          },
          { passive: true },
        )
        window.addEventListener('touchend', () => (isDragging = false))
        window.addEventListener(
          'touchmove',
          (e) => {
            if (isDragging) {
              const deltaMove = {
                x: e.touches[0].clientX - previousPosition.x,
                y: e.touches[0].clientY - previousPosition.y,
              }
              mesh.rotation.y += deltaMove.x * 0.01
              mesh.rotation.x += deltaMove.y * 0.01
              core.rotation.y += deltaMove.x * 0.01
              core.rotation.x += deltaMove.y * 0.01
              previousPosition = {
                x: e.touches[0].clientX,
                y: e.touches[0].clientY,
              }
            }
          },
          { passive: true },
        )

        function animate() {
          currentAnimationId = requestAnimationFrame(animate)
          if (!isDragging) {
            mesh.rotation.y += 0.005
            mesh.rotation.x += 0.002
            core.rotation.y += 0.005
            core.rotation.x += 0.002
          }
          renderer.render(scene, camera)
        }
        animate()

        window.addEventListener('resize', () => {
          if (container && container.clientWidth > 0) {
            camera.aspect = container.clientWidth / container.clientHeight
            camera.updateProjectionMatrix()
            renderer.setSize(container.clientWidth, container.clientHeight)
          }
        })
      }

      // =========================================================================
      // 5. LIGHTBOX PARA IMÁGENES
      // =========================================================================
      function openLightbox(imgSrc, title) {
        const lb = document.getElementById('lightbox')
        document.getElementById('lightbox-img').src = imgSrc
        document.getElementById('lightbox-title').textContent = title
        lb.classList.remove('hidden')
        lb.classList.add('flex')
      }

      function closeLightbox() {
        const lb = document.getElementById('lightbox')
        lb.classList.add('hidden')
        lb.classList.remove('flex')
      }
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeLightbox()
      })

      initApp()
    </script>
  </body>
</html>
